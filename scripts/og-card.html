<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(900px 540px at 78% 32%, rgba(34, 211, 238, 0.22), transparent 60%),
      radial-gradient(700px 420px at 18% 88%, rgba(94, 234, 212, 0.16), transparent 65%),
      linear-gradient(180deg, #050609 0%, #0a0c13 100%);
    color: #eef0f4;
    font-family: 'Inter', system-ui, sans-serif;
    padding: 88px 96px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  /* faint grain */
  body::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 3px 3px;
    pointer-events: none;
  }
  .eyebrow {
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.32em;
    color: rgba(94, 234, 212, 0.95);
    font-weight: 500;
  }
  .name {
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-size: 220px;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 0.95;
    background: linear-gradient(180deg, #ffffff 0%, #c7e6f0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-top: 24px;
  }
  .underline {
    width: 96px; height: 5px;
    background: linear-gradient(90deg, #22d3ee, #5eead4);
    border-radius: 999px;
    margin: 36px 0 28px 0;
    box-shadow: 0 0 24px rgba(34, 211, 238, 0.6);
  }
  .tagline {
    font-size: 30px;
    font-weight: 500;
    color: rgba(196, 202, 213, 0.95);
    max-width: 900px;
    line-height: 1.35;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-size: 20px;
    color: rgba(154, 163, 178, 0.85);
  }
  .footer .url {
    color: rgba(94, 234, 212, 0.95);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
  }
  .corner {
    position: absolute;
    top: 80px; right: 96px;
    display: flex; gap: 10px; align-items: center;
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(186, 230, 253, 0.75);
  }
  .corner .dot {
    width: 10px; height: 10px;
    border-radius: 999px;
    background: #22d3ee;
    box-shadow: 0 0 16px rgba(34, 211, 238, 0.8);
  }
</style>
</head>
<body>
  <div class="corner"><span class="dot"></span><span>milo labs</span></div>
  <div>
    <div class="eyebrow">AJ Bhatalkar</div>
    <div class="name">Builder.</div>
    <div class="underline"></div>
    <div class="tagline">
      Engineering manager turned AI-native builder. Ten years scaling identity, trust, and ML systems at Airbnb and Twitter.
    </div>
  </div>
  <div class="footer">
    <span>San Francisco Bay Area</span>
    <span class="url">ajeenkya.github.io</span>
  </div>
</body>
</html>
